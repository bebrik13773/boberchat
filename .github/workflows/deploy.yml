on:
  push:
    branches:
      - main
      - beta-dev
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - production

name: 🚀 Deploy БоберЧат

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 🔐 Build runtime DB config
      shell: bash
      env:
        DB_HOST: ${{ secrets.BOBER_DB_HOST }}
        DB_USER: ${{ secrets.BOBER_DB_USER }}
        DB_PASS: ${{ secrets.BOBER_DB_PASS }}
        DB_NAME: ${{ secrets.BOBER_DB_NAME }}
      run: |
        missing=0
        for var in DB_HOST DB_USER DB_NAME; do
          if [ -z "${!var}" ]; then
            echo "::error ::Missing required secret: BOBER_${var}"
            missing=1
          fi
        done
        if [ "$missing" -ne 0 ]; then exit 1; fi

        php_escape() {
          python3 -c "import sys; value = sys.stdin.read(); print(value.replace('\\\\', '\\\\\\\\').replace(\"'\", \"\\\\'\").replace('\\r', '').replace('\\n', '\\\\n'), end='')"
        }

        DB_HOST_ESCAPED="$(printf '%s' "$DB_HOST" | php_escape)"
        DB_USER_ESCAPED="$(printf '%s' "$DB_USER" | php_escape)"
        DB_PASS_ESCAPED="$(printf '%s' "$DB_PASS" | php_escape)"
        DB_NAME_ESCAPED="$(printf '%s' "$DB_NAME" | php_escape)"

        mkdir -p ./public/api
        cat > ./public/api/db_config.php <<EOF
        <?php

        return [
            'db_host' => '${DB_HOST_ESCAPED}',
            'db_user' => '${DB_USER_ESCAPED}',
            'db_pass' => '${DB_PASS_ESCAPED}',
            'db_name' => '${DB_NAME_ESCAPED}',
        ];
        EOF

    - name: 🔍 Determine deployment directory
      id: deployment
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          if [ "${{ inputs.target_environment }}" == "production" ]; then
            echo "target_dir=htdocs/" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "target_dir=htdocs/beta/" >> $GITHUB_OUTPUT
            echo "env_name=Beta" >> $GITHUB_OUTPUT
          fi
        else
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "target_dir=htdocs/" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "target_dir=htdocs/beta/" >> $GITHUB_OUTPUT
            echo "env_name=Beta" >> $GITHUB_OUTPUT
          fi
        fi
        echo "branch_name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

    - name: 📦 Deploy to ${{ steps.deployment.outputs.env_name }}
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.server }}
        username: ${{ secrets.username }}
        password: ${{ secrets.password }}
        local-dir: ./public/
        server-dir: ${{ steps.deployment.outputs.target_dir }}

    - name: ✅ Deployment Summary
      run: |
        echo "### 🎉 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${{ steps.deployment.outputs.branch_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment:** ${{ steps.deployment.outputs.env_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Target Directory:** ${{ steps.deployment.outputs.target_dir }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Runtime Config:** \`public/api/db_config.php\` ← GitHub Secrets" >> $GITHUB_STEP_SUMMARY

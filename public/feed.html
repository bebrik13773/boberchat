<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>БоберЧат — Лента</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .topbar {
    position: sticky;
    top: 0;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-soft);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }
  .topbar .logo {
    font-weight: 700;
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .feed {
    max-width: 560px;
    margin: 0 auto;
    padding: 16px;
  }

  /* Форма создания поста */
  .composer {
    margin-bottom: 20px;
  }
  .composer textarea {
    margin-bottom: 10px;
  }
  .composer-footer {
    display: flex;
    justify-content: flex-end;
  }

  /* Карточка поста */
  .post-card {
    margin-bottom: 14px;
  }
  .post-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .post-header .names {
    display: flex;
    flex-direction: column;
    line-height: 1.25;
  }
  .post-author-name {
    font-weight: 600;
    font-size: 14px;
    color: var(--text-primary);
  }
  .post-meta {
    font-size: 12px;
    color: var(--text-muted);
  }
  .post-text {
    color: var(--text-primary);
    margin-bottom: 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .post-image {
    width: 100%;
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
    display: block;
  }
  .post-actions {
    display: flex;
    gap: 16px;
    border-top: 1px solid var(--border-soft);
    padding-top: 10px;
  }
  .post-action {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    padding: 4px 6px;
    border-radius: 6px;
  }
  .post-action:hover {
    background: var(--accent-soft-bg);
    color: var(--text-primary);
  }
  .post-action.liked {
    color: var(--accent);
  }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🦫 БоберЧат</div>
  <div class="topbar-actions">
    <a href="profile.html" class="btn btn-ghost">Профиль</a>
    <a href="chats.html" class="btn btn-ghost">Чат</a>
  </div>
</div>

<div class="feed">

  <!-- Форма создания поста -->
  <div class="card composer">
    <textarea class="textarea" placeholder="Что нового, Бобёр?"></textarea>
    <div class="composer-footer">
      <button class="btn btn-primary">Опубликовать</button>
    </div>
  </div>

  <!-- Пример карточки поста (статика, для вёрстки) -->
  <div class="card post-card">
    <div class="post-header">
      <img class="avatar avatar-md" src="" alt="">
      <div class="names">
        <span class="post-author-name">Имя автора</span>
        <span class="post-meta">только что</span>
      </div>
    </div>
    <div class="post-text">Текст примера поста для проверки вёрстки карточки.</div>
    <div class="post-actions">
      <button class="post-action">❤ 0</button>
      <button class="post-action">💬 0</button>
    </div>
  </div>

  <!-- Пример карточки поста "на модерации" -->
  <div class="card post-card">
    <div class="post-header">
      <img class="avatar avatar-md" src="" alt="">
      <div class="names">
        <span class="post-author-name">Ты</span>
        <span class="post-meta"><span class="badge badge-pending">На модерации</span></span>
      </div>
    </div>
    <div class="post-text">Этот пост увидят остальные только после проверки.</div>
  </div>

  <!-- Пустое состояние (показывается, если постов нет вообще) -->
  <!--
  <div class="empty-state">Пока пусто. Напиши первый пост!</div>
  -->

</div>

</body>
</html>
